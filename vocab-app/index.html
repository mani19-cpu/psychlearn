<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VocabWorld - 500 Words in 10 Languages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="header-row">
      <div class="brand">
        <h1>VocabWorld</h1>
        <span class="word-badge" id="wordBadge">500 words</span>
      </div>
      <div class="lang-dropdown" id="langDropdown">
        <button class="lang-btn" id="langBtn">
          <span class="lang-btn-flag" id="langBtnFlag"></span>
          <span class="lang-btn-text" id="langBtnText"></span>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="lang-menu" id="langMenu"></div>
      </div>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search in any language..." />
      </div>
      <div class="view-toggle">
        <button id="gridViewBtn" class="view-btn active" title="Grid view">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        </button>
        <button id="listViewBtn" class="view-btn" title="List view">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="4" width="18" height="3" rx="1.5"/><rect x="3" y="10.5" width="18" height="3" rx="1.5"/><rect x="3" y="17" width="18" height="3" rx="1.5"/></svg>
        </button>
      </div>
    </div>
    <nav class="category-nav" id="categoryNav"></nav>
  </header>

  <main id="mainContent"></main>

  <div class="word-count" id="wordCount"></div>

  <script src="data.js"></script>
  <script src="translit.js"></script>
  <script src="langs-batch1.js"></script>
  <script src="langs-batch2.js"></script>
  <script src="langs-batch3.js"></script>
  <script src="langs-batch4.js"></script>
  <script src="app.js"></script>
</body>
</html>
